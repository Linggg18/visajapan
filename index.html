<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Velling Tutorial Guide</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, white, #4da3ff);
      color: #333;
    }

    .container {
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 36px;
    }

    p {
      font-size: 18px;
    }

    .box {
      margin-top: 40px;
      background: rgba(255,255,255,0.8);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <!-- 🌍 Google Translate -->
  <div id="google_translate_element"></div>

  <div class="container">
    <h1>Welcome to Velling</h1>
    <p>Your Simple Tutorial Guide</p>

    <div class="box">
      <h2>Tutorial 1</h2>
      <p>Ini adalah tempat kamu bisa menulis tutorial Visa Japan atau lainnya.</p>
    </div>
  </div>

  <!-- Script Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,id,ja,zh-CN,zh-TW',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>

  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
  </script>

</body>
</html>
