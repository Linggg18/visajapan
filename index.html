<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Velling Tutorial Guide</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: #0a1f44;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background-color: #0a1f44;
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: white;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #cfefff;
      font-weight: 500;
    }

    nav ul li a:hover {
      color: white;
    }

    /* TRANSLATE */
    #google_translate_element {
      margin: 10px 20px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #333;
    }

    /* MENU CARDS */
    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      width: 200px;
      padding: 25px;
      background-color: #0a1f44;
      color: white;
      border-radius: 15px;
      text-align: center;
      text-decoration: none;
      transition: 0.3s;
      font-size: 18px;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      background-color: #123a7a;
    }

    .icon {
      font-size: 30px;
      display: block;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<!-- NAVBAR (HANYA 1X) -->
<nav>
  <div class="logo">Velling</div>

  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="visa.html">Visa Japan</a></li>
    <li><a href="student.html">Student Guide</a></li>
    <li><a href="faq.html">FAQ</a></li>
  </ul>
</nav>

<!-- TRANSLATE -->
<div id="google_translate_element"></div>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to Velling</h1>
  <p>Your Simple Tutorial Guide</p>

  <!-- MENU ICON CARDS -->
  <div class="menu">

    <a class="card" href="visa.html">
      <span class="icon">🛂</span>
      Visa Japan
    </a>

    <a class="card" href="student.html">
      <span class="icon">🎓</span>
      Student Guide
    </a>

    <a class="card" href="faq.html">
      <span class="icon">❓</span>
      FAQ
    </a>

  </div>
</div>

<!-- GOOGLE TRANSLATE SCRIPT -->
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,id,ja,zh-CN,zh-TW',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    }, 'google_translate_element');
  }
</script>

<script type="text/javascript"
  src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>

</body>
</html>
