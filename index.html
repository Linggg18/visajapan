<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Velling Tutorial Guide</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #6fb6ff, #cfefff);
      color: white;
    }

    .container {
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 42px;
      color: #ffffff;
    }

    p {
      font-size: 20px;
      color: #eaf6ff;
    }

    .box {
      margin-top: 40px;
      background: rgba(255,255,255,0.15);
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      backdrop-filter: blur(5px);
    }
  </style>
</head>

<body>

  <!-- 🌍 Translate -->
  <div id="google_translate_element"></div>

  <div class="container">
    <h1>Welcome to Velling</h1>
    <p>Your Simple Tutorial Guide</p>

    <div class="box">
      <h2>Tutorial Section</h2>
      <p>This is where your Visa Japan or other tutorials will go.</p>
    </div>
  </div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,id,ja,zh-CN,zh-TW',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>

  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
  </script>

</body>
</html>
